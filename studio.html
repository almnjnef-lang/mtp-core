<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTP Studio // بيئة بناء العوالم</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100%; background-color: #141517;
            font-family: 'Segoe UI', sans-serif; user-select: none;
        }

        /* تخطيط الاستوديو الاحترافي: شاشة الألعاب + شريط أدوات البناء */
        .studio-layout {
            display: flex; width: 100%; height: 100%; position: relative;
        }

        #canvas-container {
            flex-grow: 1; height: 100%; position: relative;
        }

        /* شريط أدوات البناء الجانبي (مثل روبلوكس ستوديو ولكن نيون وعصري) */
        .sidebar-tools {
            width: 280px; background: #191B1D; border-right: 1px solid #2d3035;
            height: 100%; padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .sidebar-tools h3 { font-size: 16px; font-weight: 700; color: #ffffff; border-bottom: 1px solid #2d3035; padding-bottom: 10px; margin: 0; }
        
        .tool-group { display: flex; flex-direction: column; gap: 10px; }
        .tool-group label { font-size: 12px; color: #888888; font-weight: 600; }

        /* أزرار توليد المجسمات */
        .btn-tool {
            background: #232527; color: #ffffff; border: 1px solid #393B3D; padding: 12px;
            font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; text-align: right;
            transition: all 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .btn-tool:hover { border-color: #00A2FF; color: #00A2FF; background: #1e2933; }

        .btn-save { background: #2ECC71; color: white; border: none; padding: 12px; font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer; margin-top: auto; }
        .btn-save:hover { background: #27AE60; }
        
        .btn-exit { background: transparent; color: #ff4a4a; border: 1px solid #ff4a4a; padding: 8px; font-size: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; text-align: center; }
        .btn-exit:hover { background: #ff4a4a; color: white; }

        /* عداد المجسمات الحية */
        .object-counter { font-size: 11px; color: #00A2FF; background: rgba(0,162,255,0.1); padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="studio-layout">
        
        <aside class="sidebar-tools">
            <h3>MTP STUDIO // أدوات البناء</h3>
            
            <div class="tool-group">
                <label>توليد عناصر البيئة (SPAWN OBJECTS)</label>
                <button class="btn-tool" onclick="spawnMesh('cube', 0x00A2FF)"><span>📦 إضافة مكعب نيون أزرق</span></button>
                <button class="btn-tool" onclick="spawnMesh('cube', 0x2ECC71)"><span>🟩 إضافة مكعب عشب أخضر</span></button>
                <button class="btn-tool" onclick="spawnMesh('wall', 0xE74C3C)"><span>🧱 إضافة جدار حماية أحمر</span></button>
            </div>

            <div class="tool-group">
                <label>إحصائيات العالم الحالي</label>
                <div class="btn-tool" style="cursor: default;">
                    <span>إجمالي العناصر بالخريطة:</span>
                    <span class="object-counter" id="obj-count">0</span>
                </div>
            </div>

            <button class="btn-save" onclick="alert('جاري تجهيز نظام الكبسلة وحفظ الخريطة في Supabase في الخطوة القادمة!')">💾 حفظ العالم ونشره</button>
            <button class="btn-exit" onclick="window.location.href='dashboard.html'">✕ الخروج من الاستوديو</button>
        </aside>

        <div id="canvas-container"></div>

    </div>

    <script>
        // --- التحقق من أمان الجلسة عبر Supabase ---
        const SUPABASE_URL = "https://deuwblgjxtcaekpiaplt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRldXdibGdqeHRjYWVrcGlhcGx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzI3NjcsImV4cCI6MjA5NDQ0ODc2N30.DvU-NIGJj-KhjCPqvxBbCh7Kvoj5DTLgw7DKbB7lcQM";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = "index.html";
        }
        window.onload = checkUser;

        // --- بناء المحرك ثلاثي الأبعاد للاستوديو ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x141517);
        scene.fog = new THREE.FogExp2(0x141517, 0.015);

        const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // الإضاءة
        const ambientLight = new THREE.AmbientLight(0x444444);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // الأرضية الأساسية للاستوديو (Baseplate)
        const gridXZ = new THREE.GridHelper(100, 50, 0x393B3D, 0x232527);
        scene.add(gridXZ);
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x191B1D, roughness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // مصفوفة لتخزين الكتل المضافة برمجياً
        let spawnedObjects = [];

        // دالة توليد وبناء المجسمات حياً في الفضاء ثلاثي الأبعاد
        function spawnMesh(type, colorHex) {
            let geometry;
            if (type === 'cube') {
                geometry = new THREE.BoxGeometry(2, 2, 2);
            } else if (type === 'wall') {
                geometry = new THREE.BoxGeometry(6, 4, 0.8);
            }

            const material = new THREE.MeshStandardMaterial({
                color: colorHex,
                roughness: 0.2,
                metalness: 0.5,
                emissive: colorHex,
                emissiveIntensity: 0.15
            });

            const mesh = new THREE.Mesh(geometry, material);
            
            // وضع المجسم في مكان عشوائي طفيف فوق الأرضية لكي لا تتداخل الكتل
            mesh.position.set(
                (Math.random() - 0.5) * 15,
                type === 'wall' ? 2 : 1, 
                (Math.random() - 0.5) * 15
            );
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            scene.add(mesh);
            spawnedObjects.push(mesh);

            // تحديث العداد في الواجهة
            document.getElementById('obj-count').innerText = spawnedObjects.length;
        }

        // تدوير الكاميرا ببطء حول المنصة لإعطاء مظهر استوديو احترافي ديناميكي
        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            angle += 0.002;
            camera.position.x = Math.sin(angle) * 30;
            camera.position.z = Math.cos(angle) * 30;
            camera.lookAt(0, 2, 0);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
