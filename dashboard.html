<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Tech Protocol // Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Mono', monospace; }
        body { background-color: #050505; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; position: relative; }
        body::before { content: ''; position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px); background-size: 20px 20px; z-index: 1; }
        .dash-container { position: relative; z-index: 2; background: #0c0c0c; border: 1px solid #222222; padding: 40px; width: 100%; max-width: 600px; text-align: center; }
        .secure-header { border-bottom: 1px solid #222222; padding-bottom: 20px; margin-bottom: 30px; }
        .secure-header h1 { font-size: 22px; letter-spacing: 2px; text-transform: uppercase; }
        .secure-header p { font-size: 11px; color: #00ff00; letter-spacing: 1px; margin-top: 5px; }
        .user-info { background: #121212; border: 1px solid #333333; padding: 20px; font-size: 14px; text-align: left; margin-bottom: 30px; }
        .user-info span { color: #888888; }
        .btn-logout { background: #ffffff; color: #000000; border: none; padding: 12px 25px; font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: background 0.3s; }
        .btn-logout:hover { background: #cccccc; }
    </style>
</head>
<body>

    <div class="dash-container">
        <div class="secure-header">
            <h1>CORE SYSTEM // ACCESS GRANTED</h1>
            <p>// STATUS: SECURE CONNECTION ESTABLISHED</p>
        </div>
        
        <div class="user-info">
            <p><span>OPERATOR_EMAIL:</span> <span id="user-email" style="color: #ffffff;">Loading...</span></p>
            <p style="margin-top: 10px;"><span>ACCESS_LEVEL:</span> MASTER_TECH_PROTOCOL_CORE</p>
        </div>

        <button class="btn-logout" onclick="logout()">LOGOUT // خروج</button>
    </div>

    <script>
        const SUPABASE_URL = "https://deuwblgjxtcaekpiaplt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRldXdibGdqeHRjYWVrcGlhcGx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzI3NjcsImV4cCI6MjA5NDQ0ODc2N30.DvU-NIGJj-KhjCPqvxBbCh7Kvoj5DTLgw7DKbB7lcQM";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = "index.html";
            } else {
                document.getElementById('user-email').innerText = session.user.email;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        window.onload = checkUser;
    </script>
</body>
</html>
