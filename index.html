<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Tech Protocol // Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #191B1D; /* الرمادي الشهير لخلفية روبلوكس */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* تأثير شبكة خفيفة في الخلفية تذكرنا بمربعات بناء الألعاب */
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* صندوق تسجيل الدخول على شكل كارت دائري الزوايا مثل روبلوكس */
        .portal-container {
            background: #232527; /* لون الكارت الداخلي لروبلوكس */
            padding: 30px 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 8px; /* زوايا دائرية ناعمة */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand-header {
            margin-bottom: 30px;
        }

        /* تصميم الشعار بشكل فخم وعصري */
        .brand-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .brand-header p {
            font-size: 13px;
            color: #BBBBBB;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: right;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #BDC3C7;
            margin-bottom: 6px;
        }

        /* حقول إدخال نظيفة وبخلفية مريحة */
        .form-group input {
            width: 100%;
            background: #393B3D;
            border: 1px solid #111111;
            padding: 12px 15px;
            color: #ffffff;
            font-size: 15px;
            border-radius: 4px; /* زوايا ناعمة للحقول */
            outline: none;
            transition: border-color 0.2s;
            text-align: left;
        }

        .form-group input:focus {
            border-color: #00A2FF; /* يضيء بالأزرق عند الضغط عليه */
        }

        /* زر روبلوكس الأزرق الساطع الشهير */
        .btn-action {
            width: 100%;
            background: #00A2FF; 
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-action:hover {
            background: #0084FF; /* يصبح أغمق قليلاً عند تمرير الماوس */
        }

        /* روابط التبديل الملونة */
        .toggle-link {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #00A2FF;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s;
        }

        .toggle-link:hover {
            color: #33B5FF;
            text-decoration: underline;
        }

        .status-msg {
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
        }
        .success { color: #2ECC71; }
        .error { color: #E74C3C; }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="brand-header">
            <h1 id="portal-title">MASTER TECH PROTOCOL</h1>
            <p id="portal-subtitle">منصة الألعاب المتكاملة</p>
        </div>

        <div class="form-group">
            <label>البريد الإلكتروني (EMAIL)</label>
            <input type="email" id="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label>كلمة المرور (PASSWORD)</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button class="btn-action" id="main-btn" onclick="handleAuth()">تسجيل الدخول</button>
        
        <div class="toggle-link" id="toggle-auth" onclick="toggleMode()">إنشاء حساب جديد للاعب</div>
        <div class="status-msg" id="status-text"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://deuwblgjxtcaekpiaplt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRldXdibGdqeHRjYWVrcGlhcGx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzI3NjcsImV4cCI6MjA5NDQ0ODc2N30.DvU-NIGJj-KhjCPqvxBbCh7Kvoj5DTLgw7DKbB7lcQM";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const mainBtn = document.getElementById('main-btn');
            const toggleLink = document.getElementById('toggle-auth');
            const statusText = document.getElementById('status-text');
            statusText.innerText = "";

            if (isLoginMode) {
                mainBtn.innerText = "تسجيل الدخول";
                toggleLink.innerText = "إنشاء حساب جديد للاعب";
            } else {
                mainBtn.innerText = "إنشاء الحساب";
                toggleLink.innerText = "لديك حساب بالفعل؟ تسجيل دخول";
            }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusText = document.getElementById('status-text');
            
            if(!email || !password) {
                statusText.className = "status-msg error";
                statusText.innerText = "يرجى ملء الحقول المطلوبة.";
                return;
            }

            statusText.className = "status-msg";
            statusText.innerText = "جاري معالجة الطلب...";

            if (isLoginMode) {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    statusText.className = "status-msg error";
                    statusText.innerText = "خطأ: " + error.message;
                } else {
                    statusText.className = "status-msg success";
                    statusText.innerText = "تم تسجيل الدخول بنجاح! جاري تحويلك لوحة التحكم...";
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
                }
            } else {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) {
                    statusText.className = "status-msg error";
                    statusText.innerText = "خطأ: " + error.message;
                } else {
                    statusText.className = "status-msg success";
                    statusText.innerText = "تم إنشاء الحساب بنجاح! تفقد إيميلك لتأكيده.";
                }
            }
        }
    </script>
</body>
</html>
