<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Tech Protcol | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Mono', monospace;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .portal-container {
            position: relative;
            z-index: 2;
            background: #0c0c0c;
            border: 1px solid #222222;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 0px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-header h1 {
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .brand-header p {
            font-size: 11px;
            color: #666666;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #888888;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-align: right;
        }

        .form-group input {
            width: 100%;
            background: #121212;
            border: 1px solid #333333;
            padding: 12px 15px;
            color: #ffffff;
            font-size: 14px;
            border-radius: 0px;
            outline: none;
            transition: border-color 0.3s ease;
            text-align: left; 
        }

        .form-group input:focus {
            border-color: #ffffff;
        }

        .btn-action {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 14px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-action:hover {
            background: #cccccc;
        }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #666666;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .toggle-link:hover {
            color: #ffffff;
        }

        .status-msg {
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
            min-height: 18px;
        }
        .success { color: #00ff00; }
        .error { color: #ff3333; }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="brand-header">
            <h1 id="portal-title">MASTER TECH PROTCOL</h1>
            <p id="portal-subtitle">SECURE GATEWAY // ACCESS SYSTEM</p>
        </div>

        <div class="form-group">
            <label>ENTER EMAIL</label>
            <input type="email" id="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label>ENTER PASSWORD</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button class="btn-action" id="main-btn" onclick="handleAuth()">LOGIN</button>
        
        <div class="toggle-link" id="toggle-auth" onclick="toggleMode()">CREATE NEW ACCOUNT // إنشاء حساب جديد</div>
        <div class="status-msg" id="status-text"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://deuwblgjxtcaekpiaplt.supabase.co";
        const SUPABASE_KEY = "Sb_publishable_LdkS4_JwLGr99-i5NbMiWw_5WcEA07B";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('portal-title');
            const mainBtn = document.getElementById('main-btn');
            const toggleLink = document.getElementById('toggle-auth');
            const statusText = document.getElementById('status-text');
            statusText.innerText = "";

            if (isLoginMode) {
                mainBtn.innerText = "LOGIN";
                toggleLink.innerText = "CREATE NEW ACCOUNT // إنشاء حساب جديد";
            } else {
                mainBtn.innerText = "REGISTER";
                toggleLink.innerText = "ALREADY HAVE ACCOUNT // تسجيل دخول";
            }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusText = document.getElementById('status-text');
            
            if(!email || !password) {
                statusText.className = "status-msg error";
                statusText.innerText = "يرجى ملء الحقول المطلوبة.";
                return;
            }

            statusText.className = "status-msg";
            statusText.innerText = "جاري معالجة الطلب...";

            if (isLoginMode) {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    statusText.className = "status-msg error";
                    statusText.innerText = "خطأ: " + error.message;
                } else {
                    statusText.className = "status-msg success";
                    statusText.innerText = "تم تسجيل الدخول بنجاح! جاري تحويلك...";
                }
            } else {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) {
                    statusText.className = "status-msg error";
                    statusText.innerText = "خطأ: " + error.message;
                } else {
                    statusText.className = "status-msg success";
                    statusText.innerText = "تم إنشاء الحساب! تفقد إيميلك لتأكيد الحساب.";
                }
            }
        }
    </script>
</body>
</html>
