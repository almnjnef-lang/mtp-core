<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTP Engine // Core Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100%; background-color: #000000;
            font-family: 'Segoe UI', sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        #loading-screen {
            position: absolute; width: 100%; height: 100%;
            background: #191B1D; z-index: 99;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px; height: 50px; border: 3px solid #393B3D;
            border-top: 3px solid #00A2FF; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .game-ui { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .btn-back {
            background: #232527; color: white; border: 1px solid #393B3D;
            padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer;
        }

        /* حاوية أزرار اللمس لجوالك (تصميم نيون فخم) */
        .mobile-pad {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 8px;
            z-index: 15;
        }

        .touch-btn {
            background: rgba(35, 37, 39, 0.6);
            border: 1px solid #00A2FF;
            color: #00A2FF;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 162, 255, 0.2);
            touch-action: none;
        }

        /* تأثير إضاءة الزر عند ضغطه بإصبعك */
        .touch-btn:active {
            background: #00A2FF;
            color: #ffffff;
            box-shadow: 0 0 20px #00A2FF;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>جاري تشغيل محرك MTP ثلاثي الأبعاد...</h2>
        <p style="color: #888; margin-top: 5px;">تجهيز بيئة السايبر الحية وبناء خريطة الاختبار</p>
    </div>

    <div class="game-ui">
        <button class="btn-back" onclick="window.location.href='dashboard.html'">✕ إنهاء والرجوع</button>
    </div>

    <div class="mobile-pad">
        <div></div>
        <div class="touch-btn" id="t-up" style="grid-row: 1; grid-column: 2;">▲</div>
        <div></div>
        <div class="touch-btn" id="t-left" style="grid-row: 2; grid-column: 1;">◀</div>
        <div></div>
        <div class="touch-btn" id="t-right" style="grid-row: 2; grid-column: 3;">▶</div>
        <div></div>
        <div class="touch-btn" id="t-down" style="grid-row: 3; grid-column: 2;">▼</div>
        <div></div>
    </div>

    <script>
        // --- التحقق من أمان الجلسة عبر Supabase ---
        const SUPABASE_URL = "https://deuwblgjxtcaekpiaplt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRldXdibGdqeHRjYWVrcGlhcGx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzI3NjcsImV4cCI6MjA5NDQ0ODc2N30.DvU-NIGJj-KhjCPqvxBbCh7Kvoj5DTLgw7DKbB7lcQM";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = "index.html";
            } else {
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = 0;
                    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
                }, 800);
            }
        }
        window.onload = checkUser;

        // --- بناء محرك الألعاب ثلاثي الأبعاد ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0b0c);
        scene.fog = new THREE.FogExp2(0x0a0b0c, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0x00A2FF, 1.5);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const gridXZ = new THREE.GridHelper(200, 100, 0x00A2FF, 0x232527);
        scene.add(gridXZ);

        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111215, roughness: 0.4 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const playerGeo = new THREE.OctahedronGeometry(1.2, 0); 
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x00A2FF, emissive: 0x0033aa, roughness: 0.1, metalness: 0.8 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 1.5;
        player.castShadow = true;
        scene.add(player);

        const cameraOffset = new THREE.Vector3(0, 6, 14);

        // --- مصفوفة التحكم (تدعم الكيبورد واللمس معاً) ---
        const controls = { up: false, down: false, left: false, right: false };

        // 1. استقبال تحكم الكيبورد (للكمبيوتر)
        window.addEventListener('keydown', (e) => {
            let k = e.key.toLowerCase();
            if (k === 'w' || k === 'arrowup') controls.up = true;
            if (k === 's' || k === 'arrowdown') controls.down = true;
            if (k === 'a' || k === 'arrowleft') controls.left = true;
            if (k === 'd' || k === 'arrowright') controls.right = true;
        });
        window.addEventListener('keyup', (e) => {
            let k = e.key.toLowerCase();
            if (k === 'w' || k === 'arrowup') controls.up = false;
            if (k === 's' || k === 'arrowdown') controls.down = false;
            if (k === 'a' || k === 'arrowleft') controls.left = false;
            if (k === 'd' || k === 'arrowright') controls.right = false;
        });

        // 2. استقبال تحكم اللمس (لجوالك)
        function bindTouch(elementId, direction) {
            const btn = document.getElementById(elementId);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); controls[direction] = true; });
            btn.addEventListener('touchend', () => { controls[direction] = false; });
        }
        bindTouch('t-up', 'up');
        bindTouch('t-down', 'down');
        bindTouch('t-left', 'left');
        bindTouch('t-right', 'right');

        const playerSpeed = 0.25;

        function animate() {
            requestAnimationFrame(animate);
            player.rotation.y += 0.01;

            // تطبيق الحركة بناءً على الكيبورد أو اللمس
            if (controls.up) player.position.z -= playerSpeed;
            if (controls.down) player.position.z += playerSpeed;
            if (controls.left) player.position.x -= playerSpeed;
            if (controls.right) player.position.x += playerSpeed;

            camera.position.x = player.position.x + cameraOffset.x;
            camera.position.y = player.position.y + cameraOffset.y;
            camera.position.z = player.position.z + cameraOffset.z;
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
